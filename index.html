<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SoulSpark Community Directory</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0eee1;--warm:#faf8f3;--card:#faf8f2;
  --border:#d6cfc0;--mid:#6b6258;--light:#a09688;--ink:#1e1a14;
  --purple:#6b2fa0;--purple-l:#f0e6ff;--purple-m:#9050d8;
  --gold:#c47a1a;--gold-l:#fdf0dc;
  --shadow:rgba(40,30,10,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}

/* ── HEADER ── */
.hero{background:linear-gradient(135deg,#3a1060,#6b2fa0,#9050d8);padding:50px 20px 40px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'✦';font-size:300px;position:absolute;top:-80px;right:-60px;opacity:.04;line-height:1}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,48px);color:#fff;line-height:1.15;margin-bottom:10px}
.hero-title span{color:#d4a8f8;font-style:italic}
.hero-sub{font-size:14px;color:rgba(255,255,255,.75);max-width:500px;margin:0 auto 24px;line-height:1.7}
.hero-badge{display:inline-block;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);border-radius:20px;padding:6px 18px;font-size:11px;font-weight:600;color:#fff;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}

/* ── SEARCH BAR ── */
.search-bar{max-width:700px;margin:-28px auto 0;padding:0 16px;position:relative;z-index:10}
.search-inner{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.15);padding:16px 20px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.search-input{flex:1;min-width:200px;border:none;outline:none;font-family:'Jost',sans-serif;font-size:14px;color:var(--ink);background:transparent}
.search-input::placeholder{color:var(--light)}
.filter-select{border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-family:'Jost',sans-serif;font-size:12px;color:var(--mid);background:var(--warm);cursor:pointer;outline:none}
.search-count{font-size:11px;color:var(--light);white-space:nowrap}

/* ── FILTER PILLS ── */
.filter-row{max-width:700px;margin:16px auto 0;padding:0 16px;display:flex;flex-wrap:wrap;gap:6px}
.filter-pill{padding:5px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--warm);font-size:11px;font-weight:500;color:var(--mid);cursor:pointer;transition:all .15s;user-select:none}
.filter-pill.active{background:var(--purple);border-color:var(--purple);color:#fff}

/* ── GRID ── */
.grid-wrap{max-width:1100px;margin:24px auto 60px;padding:0 16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}

/* ── CARD ── */
.dir-card{background:var(--card);border-radius:16px;box-shadow:0 2px 12px var(--shadow);overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;border:1px solid var(--border)}
.dir-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px var(--shadow)}
.card-top{height:6px;background:linear-gradient(90deg,var(--purple),var(--purple-m))}
.card-body{padding:18px}
.card-photo-row{display:flex;align-items:flex-start;gap:14px;margin-bottom:12px}
.card-photo{width:64px;height:64px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--purple-l);display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid var(--border)}
.card-photo img{width:64px;height:64px;border-radius:50%;object-fit:cover}
.card-logo{width:36px;height:36px;border-radius:8px;object-fit:contain;flex-shrink:0;background:var(--warm);border:1px solid var(--border);padding:2px}
.card-logo img{width:32px;height:32px;object-fit:contain}
.card-info{flex:1;min-width:0}
.card-name{font-weight:700;font-size:15px;color:var(--ink);line-height:1.2;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-role{font-size:11px;color:var(--purple);font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-org{font-size:11px;color:var(--mid);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-loc{font-size:10px;color:var(--light);margin-top:2px}
.card-bio{font-size:12px;color:var(--mid);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.tag{font-size:9px;font-weight:600;padding:2px 8px;border-radius:10px;background:var(--purple-l);color:var(--purple);border:1px solid rgba(107,47,160,.15)}
.card-socials{display:flex;gap:8px;flex-wrap:wrap}
.social-link{font-size:10px;color:var(--mid);text-decoration:none;display:flex;align-items:center;gap:3px;padding:3px 8px;border:1px solid var(--border);border-radius:6px;background:var(--warm);transition:all .15s}
.social-link:hover{background:var(--purple-l);border-color:var(--purple);color:var(--purple)}
.card-serves{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px}
.serve-tag{font-size:9px;padding:2px 7px;border-radius:8px;background:#e8f0e6;color:#2d5a27;border:1px solid rgba(45,90,39,.15)}
.card-stars{color:#f0a500;font-size:12px;margin-top:6px}

/* ── DETAIL MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.detail-box{background:var(--card);border-radius:20px;max-width:600px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.detail-header{background:linear-gradient(135deg,#3a1060,#6b2fa0);padding:28px 24px 24px;position:relative}
.detail-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.detail-photo-row{display:flex;align-items:center;gap:16px}
.detail-photo{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,.3);background:var(--purple-l);display:flex;align-items:center;justify-content:center;font-size:36px}
.detail-photo img{width:80px;height:80px;border-radius:50%;object-fit:cover}
.detail-name{font-family:'Playfair Display',serif;font-size:22px;color:#fff;margin-bottom:4px}
.detail-role{font-size:13px;color:rgba(255,255,255,.8);margin-bottom:2px}
.detail-org{font-size:12px;color:rgba(255,255,255,.65)}
.detail-body{padding:24px}
.detail-section{margin-bottom:18px}
.detail-label{font-size:10px;font-weight:700;color:var(--light);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.detail-text{font-size:13px;color:var(--mid);line-height:1.7}
.detail-divider{height:1px;background:var(--border);margin:16px 0}
.detail-tags{display:flex;flex-wrap:wrap;gap:5px}
.detail-tag{font-size:11px;padding:3px 10px;border-radius:12px;background:var(--purple-l);color:var(--purple);font-weight:600}
.detail-socials{display:flex;flex-wrap:wrap;gap:8px}
.detail-social{font-size:12px;color:var(--mid);text-decoration:none;display:flex;align-items:center;gap:4px;padding:5px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--warm);transition:all .15s}
.detail-social:hover{background:var(--purple-l);border-color:var(--purple);color:var(--purple)}
.meta-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.meta-item{background:var(--warm);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--border)}
.meta-testimonial{grid-column:1/-1;background:var(--purple-l);border-radius:12px;padding:14px 16px;border:1px solid rgba(107,47,160,.2);text-align:left}
.meta-testimonial .meta-label{color:var(--purple);margin-bottom:6px}
.meta-testimonial .meta-val{font-size:12px;font-style:italic;font-weight:400;color:var(--mid);line-height:1.7}
.meta-label{font-size:9px;color:var(--light);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:3px}
.meta-val{font-size:12px;font-weight:600;color:var(--ink)}
.logo-strip{display:flex;align-items:center;gap:10px;margin-top:8px}
.logo-detail{width:50px;height:50px;border-radius:10px;object-fit:contain;border:1.5px solid var(--border);padding:4px;background:#fff}

/* ── EMPTY / LOADING ── */
.status-msg{text-align:center;padding:60px 20px;color:var(--mid)}
.status-msg .icon{font-size:48px;margin-bottom:12px}
.status-msg h3{font-size:18px;font-weight:600;margin-bottom:6px}
.status-msg p{font-size:13px;color:var(--light)}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── FOOTER ── */
.footer{text-align:center;padding:24px;font-size:11px;color:var(--light);border-top:1px solid var(--border)}

@media(max-width:600px){
  .grid{grid-template-columns:1fr}
  .meta-grid{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-badge">✦ Community Directory</div>
  <h1 class="hero-title">The <span>SoulSpark</span> Community</h1>
  <p class="hero-sub">Practitioners, collaborators, vendors, and allies in the spiritual &amp; wellness space.</p>
</div>

<!-- SEARCH -->
<div class="search-bar">
  <div class="search-inner">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search by name, role, modality, location..." oninput="filterPeople()">
    <button onclick="showAll()" style="padding:6px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--warm);font-family:'Jost',sans-serif;font-size:12px;font-weight:600;color:var(--mid);cursor:pointer;white-space:nowrap;transition:all .15s" onmouseover="this.style.background='var(--purple-l)';this.style.borderColor='var(--purple)';this.style.color='var(--purple)'" onmouseout="this.style.background='var(--warm)';this.style.borderColor='var(--border)';this.style.color='var(--mid)'">Show All</button>
    <select class="filter-select" id="filterLevel" onchange="filterPeople()">
      <option value="">All Experience Levels</option>
      <option value="Newbie">🌱 Newbie</option>
      <option value="Intermediate">🌿 Intermediate</option>
      <option value="Advanced">🌳 Advanced</option>
    </select>
    <span class="search-count" id="countLabel"></span>
  </div>
</div>

<!-- FILTER PILLS -->
<div class="filter-row" id="filterPills"></div>

<!-- GRID -->
<div class="grid-wrap">
  <div id="statusMsg" class="status-msg">
    <div class="spinner"></div>
    <h3>Loading directory…</h3>
    <p>Fetching community members</p>
  </div>
  <div class="grid" id="peopleGrid" style="display:none"></div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-box" id="detailBox"></div>
</div>

<div class="footer">✦ SoulSpark Resource Guide &nbsp;·&nbsp; Community Directory &nbsp;·&nbsp; Powered by Google Sheets</div>

<script>
// ── CONFIG ── paste your Apps Script Web App URL here
const ENDPOINT = 'https://script.google.com/macros/s/AKfycbzg5yEU77kQPmY3x1qbFORpwPqco9C3Oghj-vE7DN2NUbY7WTz-Vz8IPkW5Jg9Sm1o/exec';

let allPeople = [];
let activeFilter = '';

// ── LOAD ──
function loadDirectory() {
  // Uses JSONP (script tag) to bypass CORS — required for Google Apps Script
  const cbName = 'ss_dir_cb_' + Date.now();
  const tag = document.createElement('script');
  tag.src = ENDPOINT + '?action=getDirectory&callback=' + cbName;

  const timer = setTimeout(function() {
    cleanup();
    showError('Connection timed out. Make sure the Apps Script is deployed. See the setup guide.');
  }, 12000);

  window[cbName] = function(data) {
    cleanup();
    if (data && data.status === 'ok') {
      allPeople = data.people || [];
      buildFilterPills();
      filterPeople();
      document.getElementById('statusMsg').style.display = 'none';
    } else {
      showError('Could not load directory: ' + ((data && data.message) || 'Unknown error'));
    }
  };

  tag.onerror = function() {
    cleanup();
    showError('Could not connect. Check that the Apps Script is deployed with access set to Anyone.');
  };

  function cleanup() {
    clearTimeout(timer);
    delete window[cbName];
    if (tag.parentNode) tag.parentNode.removeChild(tag);
  }

  // Show loading state
  document.getElementById('statusMsg').innerHTML = '<div class="icon">🔄</div><h3>Loading directory…</h3><p>Connecting to spreadsheet</p>';
  document.head.appendChild(tag);
}

function showError(msg) {
  document.getElementById('statusMsg').innerHTML =
    '<div class="icon">⚠️</div><h3>Unable to load</h3><p>' + msg + '</p>';
}

// ── FILTER PILLS from modalities ──
function buildFilterPills() {
  const modSet = new Set();
  allPeople.forEach(function(p) {
    if(p.modalities) p.modalities.split(/[,;·]+/).forEach(function(m){
      var t=m.trim(); if(t) modSet.add(t);
    });
  });
  const top = Array.from(modSet).slice(0,12);
  const container = document.getElementById('filterPills');
  container.innerHTML = top.map(function(m) {
    return '<span class="filter-pill" onclick="toggleFilter(\'' + m.replace(/'/g,"\\'") + '\')">' + m + '</span>';
  }).join('');
}

function toggleFilter(mod) {
  activeFilter = activeFilter === mod ? '' : mod;
  document.querySelectorAll('.filter-pill').forEach(function(p){
    p.classList.toggle('active', p.textContent === activeFilter);
  });
  filterPeople();
}

// ── FILTER & RENDER ──
function filterPeople() {
  const q      = (document.getElementById('searchInput').value||'').toLowerCase();
  const level  = document.getElementById('filterLevel').value;
  const grid   = document.getElementById('peopleGrid');
  const status = document.getElementById('statusMsg');

  let filtered = allPeople.filter(function(p) {
    const searchable = [p.full_name,p.role_title,p.org_business,p.modalities,p.location,p.about_bio,p.specialty_tags].join(' ').toLowerCase();
    if(q && !searchable.includes(q)) return false;
    if(level && p.experience_level !== level) return false;
    if(activeFilter && !(p.modalities||'').toLowerCase().includes(activeFilter.toLowerCase())) return false;
    return true;
  });

  document.getElementById('countLabel').textContent = filtered.length + ' member' + (filtered.length!==1?'s':'');

  if(!filtered.length) {
    grid.style.display='none';
    status.style.display='block';
    status.innerHTML='<div class="icon">🔍</div><h3>No results</h3><p>Try adjusting your search or filters.</p>';
    return;
  }

  status.style.display='none';
  grid.style.display='grid';
  grid.innerHTML = filtered.map(function(p,i) { return buildCard(p,i); }).join('');
}

// ── BUILD CARD ──
function buildCard(p, i) {
  var photoHtml = p.photo_b64
    ? '<div class="card-photo"><img src="data:' + (p.photo_mime||'image/jpeg') + ';base64,' + p.photo_b64 + '" alt="' + esc(p.full_name) + '"></div>'
    : '<div class="card-photo">👤</div>';

  var logoHtml = p.logo_b64
    ? '<div class="card-logo"><img src="data:' + (p.logo_mime||'image/jpeg') + ';base64,' + p.logo_b64 + '" alt="logo"></div>'
    : '';

  var tags = (p.modalities||'').split(/[,;·]+/).filter(Boolean).slice(0,4).map(function(t){
    return '<span class="tag">' + esc(t.trim()) + '</span>';
  }).join('');

  var socials = [];
  if(p.website)   socials.push('<a href="' + esc(p.website) + '" target="_blank" class="social-link">🌐 Website</a>');
  if(p.instagram) socials.push('<a href="https://instagram.com/' + esc(p.instagram.replace('@','')) + '" target="_blank" class="social-link">📸 Instagram</a>');
  if(p.tiktok)    socials.push('<a href="https://tiktok.com/@' + esc(p.tiktok.replace('@','')) + '" target="_blank" class="social-link">🎵 TikTok</a>');
  if(p.facebook)  socials.push('<a href="' + esc(p.facebook) + '" target="_blank" class="social-link">📘 Facebook</a>');
  if(p.linkedin)  socials.push('<a href="' + esc(p.linkedin) + '" target="_blank" class="social-link">💼 LinkedIn</a>');

  var stars = p.rating ? '★'.repeat(parseInt(p.rating)||0) : '';

  var serves = [];
  if(p.serves_local==='✓'||p.serves_local==='true'||p.serves_local==='TRUE') serves.push('📍 Local');
  if(p.serves_online==='✓'||p.serves_online==='true'||p.serves_online==='TRUE') serves.push('💻 Online');
  if(p.serves_national==='✓'||p.serves_national==='true'||p.serves_national==='TRUE') serves.push('🇺🇸 National');

  return '<div class="dir-card" onclick="openDetail(' + i + ')">' +
    '<div class="card-top"></div>' +
    '<div class="card-body">' +
      '<div class="card-photo-row">' + photoHtml + logoHtml +
        '<div class="card-info">' +
          '<div class="card-name">' + esc(p.full_name) + '</div>' +
          (p.role_title ? '<div class="card-role">' + esc(p.role_title) + '</div>' : '') +
          (p.org_business ? '<div class="card-org">' + esc(p.org_business) + '</div>' : '') +
          (p.location ? '<div class="card-loc">📍 ' + esc(p.location) + '</div>' : '') +
        '</div>' +
      '</div>' +
      (p.about_bio ? '<div class="card-bio">' + esc(p.about_bio) + '</div>' : '') +
      (tags ? '<div class="card-tags">' + tags + '</div>' : '') +
      (serves.length ? '<div class="card-serves">' + serves.map(function(s){return '<span class="serve-tag">'+s+'</span>';}).join('') + '</div>' : '') +
      (stars ? '<div class="card-stars">' + stars + '</div>' : '') +
      (socials.length ? '<div class="card-socials" onclick="event.stopPropagation()">' + socials.slice(0,2).join('') + '</div>' : '') +
    '</div></div>';
}

// ── DETAIL MODAL ──
function openDetail(idx) {
  var p = allPeople[idx];
  if(!p) return;

  var photoHtml = p.photo_b64
    ? '<div class="detail-photo"><img src="data:' + (p.photo_mime||'image/jpeg') + ';base64,' + p.photo_b64 + '" alt="' + esc(p.full_name) + '"></div>'
    : '<div class="detail-photo">👤</div>';

  var logoHtml = p.logo_b64
    ? '<div class="logo-strip"><img src="data:' + (p.logo_mime||'image/jpeg') + ';base64,' + p.logo_b64 + '" class="logo-detail" alt="logo"></div>'
    : '';

  var socials = [];
  if(p.website)   socials.push('<a href="' + esc(p.website) + '" target="_blank" class="detail-social">🌐 Website</a>');
  if(p.instagram) socials.push('<a href="https://instagram.com/' + esc(p.instagram.replace('@','')) + '" target="_blank" class="detail-social">📸 ' + esc(p.instagram) + '</a>');
  if(p.tiktok)    socials.push('<a href="https://tiktok.com/@' + esc(p.tiktok.replace('@','')) + '" target="_blank" class="detail-social">🎵 ' + esc(p.tiktok) + '</a>');
  if(p.facebook)  socials.push('<a href="' + esc(p.facebook) + '" target="_blank" class="detail-social">📘 Facebook</a>');
  if(p.linkedin)  socials.push('<a href="' + esc(p.linkedin) + '" target="_blank" class="detail-social">💼 LinkedIn</a>');

  var tags = (p.modalities||'').split(/[,;·]+/).filter(Boolean).map(function(t){
    return '<span class="detail-tag">' + esc(t.trim()) + '</span>';
  }).join('');

  var specTags = (p.specialty_tags||'').split(/[,;·]+/).filter(Boolean).map(function(t){
    return '<span class="detail-tag" style="background:#e8f0e6;color:#2d5a27;border-color:rgba(45,90,39,.15)">' + esc(t.trim()) + '</span>';
  }).join('');

  var metaItems = [];
  if(p.mbti)       metaItems.push({label:'MBTI',     val:p.mbti});
  if(p.hd_type)    metaItems.push({label:'Human Design', val:p.hd_type});
  if(p.enneagram)  metaItems.push({label:'Enneagram', val:p.enneagram});
  if(p.sun_sign)   metaItems.push({label:'Sun Sign',  val:p.sun_sign});
  if(p.moon_sign)  metaItems.push({label:'Moon Sign', val:p.moon_sign});
  if(p.rising_sign)metaItems.push({label:'Rising',    val:p.rising_sign});

  var html = '<div class="detail-header">' +
    '<button class="detail-close" onclick="closeDetailBtn()">✕</button>' +
    '<div class="detail-photo-row">' + photoHtml +
      '<div>' +
        '<div class="detail-name">' + esc(p.full_name) + '</div>' +
        (p.role_title ? '<div class="detail-role">' + esc(p.role_title) + '</div>' : '') +
        (p.org_business ? '<div class="detail-org">' + esc(p.org_business) + '</div>' : '') +
      '</div>' +
    '</div>' +
    (logoHtml || '') +
  '</div>' +
  '<div class="detail-body">' +
    (p.about_bio ? '<div class="detail-section"><div class="detail-label">About</div><div class="detail-text">' + esc(p.about_bio) + '</div></div>' : '') +
    (p.location  ? '<div class="detail-section"><div class="detail-label">Location</div><div class="detail-text">📍 ' + esc(p.location) + '</div></div>' : '') +
    (tags ? '<div class="detail-section"><div class="detail-label">Modalities</div><div class="detail-tags">' + tags + '</div></div>' : '') +
    (specTags ? '<div class="detail-section"><div class="detail-label">Specialties</div><div class="detail-tags">' + specTags + '</div></div>' : '') +
    (p.ideal_client ? '<div class="detail-section"><div class="detail-label">Ideal Client</div><div class="detail-text">' + esc(p.ideal_client) + '</div></div>' : '') +
    (p.certifications ? '<div class="detail-section"><div class="detail-label">Certifications</div><div class="detail-text">' + esc(p.certifications) + '</div></div>' : '') +
    (metaItems.length || p.testimonial ? '<div class="detail-section"><div class="detail-label">✨ Metaphysical Profile</div><div class="meta-grid">' +
      metaItems.map(function(m){return '<div class="meta-item"><span class="meta-label">'+m.label+'</span><span class="meta-val">'+esc(m.val)+'</span></div>';}).join('') +
      (p.testimonial ? '<div class="meta-testimonial"><span class="meta-label">✦ Testimonials &amp; Feedback</span><span class="meta-val">&ldquo;' + esc(p.testimonial) + '&rdquo;</span></div>' : '') +
    '</div></div>' : '') +
    (p.experience_level ? '<div class="detail-section"><div class="detail-label">Experience Level</div><div class="detail-text">' + esc(p.experience_level) + '</div></div>' : '') +
    (socials.length ? '<div class="detail-divider"></div><div class="detail-section"><div class="detail-label">Connect</div><div class="detail-socials">' + socials.join('') + '</div></div>' : '') +
    (p.collab_notes ? '<div class="detail-divider"></div><div class="detail-section"><div class="detail-label">Open to Collaboration</div><div class="detail-text">' + esc(p.collab_notes) + '</div></div>' : '') +
  '</div>';

  document.getElementById('detailBox').innerHTML = html;
  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetailBtn() {
  document.getElementById('detailOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function closeDetail(e) {
  if(e.target === document.getElementById('detailOverlay')) closeDetailBtn();
}

function showAll() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterLevel').value = '';
  activeFilter = '';
  document.querySelectorAll('.filter-pill').forEach(function(p){ p.classList.remove('active'); });
  filterPeople();
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── START ──
// Try local CRM data first (instant), then live sync from sheet
loadFromLocalStorage();
loadDirectory();
</script>
